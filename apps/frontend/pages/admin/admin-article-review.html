<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nomination Review</title>
    <script src="../../js/admin/auth-guard.js"></script>
    <link rel="stylesheet" href="../../styles/main/base.css" />
    <link rel="stylesheet" href="../../styles/main/nav.css" />
    <link rel="stylesheet" href="../../styles/admin/admin-sidebar.css" />
    <link rel="stylesheet" href="../../styles/admin/admin-article-review.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="../assets/images/new.ico" />
  </head>
  <body>
    <header class="admin-topbar">
      <a href="../../index.html">
        <img
          src="../../assets/images/luminary-black-logo.png"
          alt="Luminary Logo"
          width="100px"
        />
      </a>

      <label
        for="nav-toggle"
        class="hamburger gap-1"
        aria-label="Toggle sidebar"
      >
        <span></span>
        <span></span>
        <span></span>
      </label>
    </header>
    <main class="admin-nomination flex flex-row">
      <input type="checkbox" id="nav-toggle" class="nav-toggle" />

      <aside
        id="admin-sidebar"
        class="admin-sidebar admin-sidebar--panel flex flex-col gap-8"
        aria-label="Admin navigation"
      >
        <a
          href="../../index.html"
          class="sidebar-brand"
          aria-label="Go to nominations dashboard"
        >
          <picture>
            <source
              media="(min-width: 768px)"
              srcset="../../assets/images/luminary-black-logo.png"
              type="image/png"
            />
            <img
              src="../../assets/images/luminary-black-logo.png"
              alt="Luminary Logo"
              width="168"
            />
          </picture>
        </a>

        <nav class="sidebar-nav flex flex-col gap-3" aria-label="Admin pages">
          <a href="admin-nomination.html" class="sidebar-btn sidebar-btn--icon">
            <span class="sidebar-btn__icon" aria-hidden="true">
              <i class="fa-solid fa-star"></i>
            </span>
            <span>Nominations</span>
          </a>

          <a href="admin-news.html" class="sidebar-btn sidebar-btn--icon">
            <span class="sidebar-btn__icon" aria-hidden="true">
              <i class="fa-regular fa-newspaper"></i>
            </span>
            <span>News Articles</span>
          </a>
        </nav>

        <label
          for="nav-toggle"
          class="sidebar-close-btn"
          aria-label="Close sidebar"
        >
          &#x2715; Close
        </label>
      </aside>

      <!-- page content -->
      <section class="page-content flex flex-col">
        <!-- article summary -->
        <section class="flex flex-col gap-3">
          <a href="./admin-news.html">&larr; Back to News Management</a>

          <article
            id="article-summary"
            class="flex gap-3 justify-between article-summary"
          >
            <div class="flex flex-col gap-3">
              <h1 id="article-heading"></h1>

              <p id="article-description" class="article-description"></p>
            </div>
            <span class="flex items-start gap-3 btn-wrapper">
              <button class="article-btn approve">Approve</button>
              <button class="article-btn reject">Reject</button>
            </span>
          </article>
        </section>

        <!-- article details section -->
        <section
          class="article-details-section flex gap-8 justify-between items-start"
        >
          <section
            id="article-details"
            class="article-details p-8 flex flex-col"
          >
            <picture id="article-header-image"> </picture>

            <article id="article-content" class="flex flex-col gap-3"></article>
          </section>

          <!-- article sidebar -->
          <aside
            id="article-sidebar"
            class="article-sidebar p-4 flex flex-col gap-5"
          >
            <div class="article-sidebar-details flex flex-col gap-3">
              <h2 class="article-sidebar-heading">Status</h2>
              <p>
                <span id="article-status" class="article-status pending"></span>
              </p>
            </div>

            <div class="article-sidebar-details flex flex-col gap-1">
              <h2 class="article-sidebar-heading">Source/Type</h2>
              <p
                id="article-source-type"
                class="article-sidebar-description"
              ></p>
            </div>

            <div class="article-sidebar-details flex flex-col gap-1">
              <h2 class="article-sidebar-heading">Submitted By</h2>
              <p id="article-submitter" class="article-sidebar-description"></p>
            </div>

            <div class="article-sidebar-details flex flex-col gap-1">
              <h2 class="article-sidebar-heading">Category</h2>
              <p id="article-category" class="article-sidebar-description"></p>
            </div>

            <div class="article-sidebar-details flex flex-col gap-1">
              <h2 class="article-sidebar-heading">Date Submitted</h2>
              <p
                id="article-submission-date"
                class="article-sidebar-description"
              ></p>
            </div>

            <a href="">View Original Source</a>
          </aside>
        </section>
      </section>
    </main>
    <script src="../../js/main/sidebar.js"></script>
    <script src="../../js/admin/admin-article-review.js"></script>
    <script
      src="https://kit.fontawesome.com/de3cc7cb54.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
