<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/nav.css" />
    <link rel="stylesheet" href="../styles/profile.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="../assets/images/luminary-green-favicon.ico"
    />
    <title>Luminary</title>
  </head>
  <body>
    <header class="header-container flex flex-col items-center">
      <nav
        aria-label="primary navigation"
        class="header-section__nav flex flex-row justify-between items-center px-4 py-4"
      >
        <a href="../index.html">
          <picture>
            <source
              media="(min-width: 768px)"
              srcset="../assets/images/luminary-green-logo.png"
              type="image/png"
            />
            <img
              src="../assets/images/luminary-green-logo.png"
              alt="Luminary Logo"
              width="120px"
            />
          </picture>
        </a>

        <input type="checkbox" id="nav-toggle" class="nav-toggle" />
        <label
          for="nav-toggle"
          class="hamburger gap-1"
          aria-label="Toggle navigation"
        >
          <span></span>
          <span></span>
          <span></span>
        </label>

        <div class="nav-links">
          <a href="./directory.html">Directory</a>
          <a href="./news.html">News</a>
          <a href="./nomination.html" class="nav-cta__btn rounded-md p-2 px-4"
            >Nominate</a
          >
        </div>
      </nav>
    </header>
    <main class="container">
      <section
        aria-label="profile header"
        class="profile-header container flex"
      >
        <picture class="profile-image">
          <source
            media="(min-width: 768px)"
            srcset="../assets/images/profile-image.jpg"
            type="image/png"
          />
          <img src="../assets/images/profile-image.jpg" alt="profile photo" />
        </picture>
        <div aria-label="name and occupation" class="brief-info"></div>
      </section>
      <section aria-label="Bio" class="container" id="bio-section"></section>
      <section
        aria-label="About"
        class="container info"
        id="about-section"
      ></section>
      <section
        aria-label="Work"
        class="container info"
        id="work-section"
      ></section>
      <section
        aria-label="related links"
        class="container related-links"
        id="related-links"
      ></section>
      <section
        aria-label="Social links"
        class="container related-links"
        id="social-links"
      ></section>
    </main>

    <script src="../js/profile.js"></script>
  </body>
</html>
