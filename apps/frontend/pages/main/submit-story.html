<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Luminary article submission form." />
    <title>Submit a Story | Luminary</title>
    <link rel="stylesheet" href="../../styles/main/base.css" />
    <link rel="stylesheet" href="../../styles/main/nav.css" />
    <link rel="stylesheet" href="../../styles/admin/admin-add-article.css" />
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="../../assets/images/luminary-black-favicon.png" />
  </head>
  <body>
    <header class="header-container flex flex-col items-center">
      <nav
        aria-label="primary navigation"
        class="header-section__nav flex flex-row justify-between items-center px-4 py-4"
      >
        <a href="../../index.html">
          <picture>
            <source media="(min-width: 768px)" srcset="../../assets/images/luminary-green-logo.png" type="image/png" />
            <img src="../../assets/images/luminary-green-logo.png" alt="Luminary Logo" width="120px" />
          </picture>
        </a>
        <input type="checkbox" id="nav-toggle" class="nav-toggle" />
        <label for="nav-toggle" class="hamburger gap-1" aria-label="Toggle navigation">
          <span></span><span></span><span></span>
        </label>
        <div class="nav-links">
          <a href="./directory.html">Directory</a>
          <a href="./news.html">News</a>
          <a href="./nomination.html" class="nav-cta__btn rounded-md p-2 px-4">Nominate</a>
        </div>
      </nav>
    </header>

    <main class="admin-shell flex flex-col justify-center items-center pt-10">

      <section class="add-article-panel">
        <div class="add-article-content">

          <header class="editor-header">
            <div class="editor-header__lead">
              <a href="./news.html" class="back-link">
                <span class="back-link__icon" aria-hidden="true">
                  <i class="fa-solid fa-arrow-left"></i>
                </span>
                <span>Back to News</span>
              </a>
              <h1>Submit A Story</h1>
              <p>Create an original post or link to an external news source. Your submission will be reviewed before publishing.</p>
            </div>
            <div class="editor-actions">
              <!-- Triggers form submission via JS -->
              <button type="button" id="submitBtn" class="primary-btn">Submit Article</button>
            </div>
          </header>

          <!-- Feedback message (shown after submit) -->
          <div id="formMessage" style="display:none;" aria-live="polite"></div>

          <form class="article-form" id="articleEditor" novalidate>

            <section class="editor-card">
              <header class="editor-card__header">
                <h2>Basic Information</h2>
              </header>

              <div class="form-grid">

                <div class="field field--full">
                  <label for="articleTitle">Headline / Title <span aria-hidden="true">*</span></label>
                  <input id="articleTitle" name="articleTitle" type="text" placeholder="Enter the article title" required />
                </div>

                <div class="field select-field">
                  <label for="sourceType">Source Type</label>
                  <select id="sourceType" name="sourceType">
                    <option value="external">External Link</option>
                    <option value="original">Original Content</option>
                  </select>
                </div>

                <div class="field select-field">
                  <label for="articleCategory">Category <span aria-hidden="true">*</span></label>
                  <select id="articleCategory" name="articleCategory" required>
                    <option value="">Select category</option>
                    <option value="Technology">Technology</option>
                    <option value="Leadership">Leadership</option>
                    <option value="Climate Tech">Climate Tech</option>
                    <option value="Healthcare">Healthcare</option>
                    <option value="Education">Education</option>
                    <option value="Culture">Culture</option>
                    <option value="Finance">Finance</option>
                    <option value="Agriculture">Agriculture</option>
                    <option value="Policy">Policy</option>
                    <option value="Architecture">Architecture</option>
                  </select>
                </div>

                <!-- ↓ NEW: Region field -->
                <div class="field select-field">
                  <label for="articleRegion">Region <span aria-hidden="true">*</span></label>
                  <select id="articleRegion" name="articleRegion" required>
                    <option value="">Select region</option>
                    <option value="Global">Global</option>
                    <option value="Africa">Africa</option>
                    <option value="North America">North America</option>
                    <option value="Europe">Europe</option>
                    <option value="Asia">Asia</option>
                    <option value="Latin America">Latin America</option>
                    <option value="Middle East">Middle East</option>
                  </select>
                </div>

                <div class="field">
                  <label for="sourceName" id="sourceNameLabel">Author / Source Name</label>
                  <input id="sourceName" name="sourceName" type="text" placeholder="E.g. The New York Times" />
                </div>

                <div class="field">
                  <label for="publicationDate">Publication Date</label>
                  <input id="publicationDate" name="publicationDate" type="date" />
                </div>

                <div class="field field--full">
                  <label for="externalUrl">External URL <span id="externalUrlNote">(required for external sources)</span></label>
                  <input id="externalUrl" name="externalUrl" type="url" placeholder="https://" />
                </div>

              </div>
            </section>

            <section class="editor-card">
              <header class="editor-card__header">
                <h2>Media &amp; Summary</h2>
              </header>

              <!-- Cover image: file upload — uploaded to Sanity assets API via JS -->
              <div class="field field--full">
                <label for="coverImage">Cover Image</label>
                <label for="coverImage" class="upload-dropzone" id="uploadDropzone">
                  <input id="coverImage" name="coverImage" type="file" accept=".svg,.png,.jpg,.jpeg,.gif" hidden />
                  <div class="upload-dropzone__preview" id="uploadPreview" hidden></div>
                  <div class="upload-dropzone__content">
                    <span class="upload-icon" aria-hidden="true">
                      <i class="fa-regular fa-image"></i>
                    </span>
                    <strong id="uploadTitle">Click to upload or drag and drop</strong>
                    <p id="uploadMeta">SVG, PNG, JPG or GIF (max. 5MB)</p>
                  </div>
                </label>
              </div>

              <div class="field field--full">
                <label for="briefSummary">Brief Summary</label>
                <textarea id="briefSummary" name="briefSummary" placeholder="A short summary that will appear on the news card…"></textarea>
              </div>

            </section>

            <section class="editor-card">
              <header class="editor-card__header editor-card__header--stacked">
                <div>
                  <h2>Article Content</h2>
                  <p id="contentNote">Used when composing original Luminary content.</p>
                </div>
              </header>

              <div class="editor-surface">
                <div class="editor-toolbar" aria-label="Article formatting tools">
                  <button type="button" aria-label="Bold">B</button>
                  <button type="button" aria-label="Italic"><em>I</em></button>
                  <button type="button" aria-label="Underline"><u>U</u></button>
                  <span class="toolbar-divider" aria-hidden="true"></span>
                  <button type="button" aria-label="Bullet list">&#8226;</button>
                  <button type="button" aria-label="Numbered list">1.</button>
                  <button type="button" aria-label="Add link">&#128279;</button>
                </div>
                <textarea
                  id="articleContent"
                  name="articleContent"
                  class="content-editor"
                  placeholder="Start writing the article content here…"
                ></textarea>
              </div>
            </section>

          </form>
        </div>
      </section>
    </main>

    <script type="module" src="../../js/main/add-article.js"></script>
    <script src="https://kit.fontawesome.com/de3cc7cb54.js" crossorigin="anonymous"></script>
    <script src="../../js/admin/sidebar.js" defer></script>
    <script src="../../js/admin/admin-add-article.js" defer></script>
    <script
      src="https://kit.fontawesome.com/de3cc7cb54.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
