<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Luminary admin editor for creating and publishing news articles."
    />
    <title>Add New Article | Luminary Admin</title>
    <link rel="stylesheet" href="../../styles/main/base.css" />
    <link rel="stylesheet" href="../../styles/main/nav.css" />
    <link rel="stylesheet" href="../../styles/admin/admin-sidebar.css" />
    <link rel="stylesheet" href="../../styles/admin/admin-add-article.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      href="../../assets/images/luminary-black-favicon.png"
    />
    <link rel="icon" type="image/x-icon" href="../assets/images/new.ico" />
  </head>
  <body>
    <header class="header-container flex flex-col items-center">
      <nav
        aria-label="primary navigation"
        class="header-section__nav flex flex-row justify-between items-center px-4 py-4"
      >
        <a href="../../index.html">
          <picture>
            <source
              media="(min-width: 768px)"
              srcset="../../assets/images/luminary-green-logo.png"
              type="image/png"
            />
            <img
              src="../../assets/images/luminary-green-logo.png"
              alt="Luminary Logo"
              width="120px"
            />
          </picture>
        </a>

        <input type="checkbox" id="nav-toggle" class="nav-toggle" />
        <label
          for="nav-toggle"
          class="hamburger gap-1"
          aria-label="Toggle navigation"
        >
          <span></span>
          <span></span>
          <span></span>
        </label>

        <div class="nav-links">
          <a href="./directory.html">Directory</a>
          <a href="./news.html">News</a>
          <a href="./nomination.html" class="nav-cta__btn rounded-md p-2 px-4"
            >Nominate</a
          >
        </div>
      </nav>
    </header>

    <main class="admin-shell flex flex-col justify-center items-center pt-10">
      <input type="checkbox" id="nav-toggle" class="nav-toggle" />

      <section class="add-article-panel">
        <div class="add-article-content">
          <header class="editor-header">
            <div class="editor-header__lead">
              <a href="../../index.html" class="back-link">
                <span class="back-link__icon" aria-hidden="true">
                  <i class="fa-solid fa-arrow-left"></i>
                </span>
                <span>Back to Home</span>
              </a>
              <h1>Submit A Story</h1>
              <p>Create an original post or link to an external news source.</p>
            </div>

            <div class="editor-actions">
              <button type="button" class="ghost-btn">Save Draft</button>
              <button type="button" class="primary-btn">Publish Article</button>
            </div>
          </header>

          <form class="article-form" id="articleEditor">
            <section class="editor-card">
              <header class="editor-card__header">
                <h2>Basic Information</h2>
              </header>

              <div class="form-grid">
                <div class="field field--full">
                  <label for="articleTitle">Headline / Title</label>
                  <input
                    id="articleTitle"
                    name="articleTitle"
                    type="text"
                    placeholder="Enter the article title"
                  />
                </div>

                <div class="field select-field">
                  <label for="sourceType">Source Type</label>
                  <select id="sourceType" name="sourceType">
                    <option value="external">External Link</option>
                    <option value="original">Original Content</option>
                  </select>
                </div>

                <div class="field select-field">
                  <label for="articleCategory">Category</label>
                  <select id="articleCategory" name="articleCategory">
                    <option value="" selected>Select category</option>
                    <option value="technology">Technology</option>
                    <option value="leadership">Leadership</option>
                    <option value="climate">Climate</option>
                    <option value="healthcare">Healthcare</option>
                    <option value="education">Education</option>
                    <option value="culture">Culture</option>
                  </select>
                </div>

                <div class="field">
                  <label for="sourceName">Author / Source Name</label>
                  <input
                    id="sourceName"
                    name="sourceName"
                    type="text"
                    placeholder="E.g. The New York Times"
                  />
                </div>

                <div class="field">
                  <label for="publicationDate">Publication Date</label>
                  <input
                    id="publicationDate"
                    name="publicationDate"
                    type="date"
                    value="2026-03-20"
                  />
                </div>

                <div class="field field--full">
                  <label for="externalUrl">External URL (If applicable)</label>
                  <input
                    id="externalUrl"
                    name="externalUrl"
                    type="url"
                    placeholder="https://"
                  />
                </div>
              </div>
            </section>

            <section class="editor-card">
              <header class="editor-card__header">
                <h2>Media &amp; Summary</h2>
              </header>

              <div class="field field--full">
                <label for="coverImage">Cover Image</label>
                <label
                  for="coverImage"
                  class="upload-dropzone"
                  id="uploadDropzone"
                >
                  <input
                    id="coverImage"
                    name="coverImage"
                    type="file"
                    accept=".svg,.png,.jpg,.jpeg,.gif"
                    hidden
                  />
                  <div
                    class="upload-dropzone__preview"
                    id="uploadPreview"
                    hidden
                  ></div>
                  <div class="upload-dropzone__content">
                    <span class="upload-icon" aria-hidden="true">
                      <i class="fa-regular fa-image"></i>
                    </span>
                    <strong id="uploadTitle"
                      >Click to upload or drag and drop</strong
                    >
                    <p id="uploadMeta">SVG, PNG, JPG or GIF (max. 5MB)</p>
                  </div>
                </label>
              </div>

              <div class="field field--full">
                <label for="briefSummary">Brief Summary</label>
                <textarea
                  id="briefSummary"
                  name="briefSummary"
                  placeholder="Write a short summary that will appear on the news card..."
                ></textarea>
              </div>
            </section>

            <section class="editor-card">
              <header class="editor-card__header editor-card__header--stacked">
                <div>
                  <h2>Article Content (For Original Content)</h2>
                  <p id="contentNote">
                    Used when composing original Luminary content.
                  </p>
                </div>
              </header>

              <div class="editor-surface">
                <div
                  class="editor-toolbar"
                  aria-label="Article formatting tools"
                >
                  <button type="button" aria-label="Bold">B</button>
                  <button type="button" aria-label="Italic"><em>I</em></button>
                  <button type="button" aria-label="Underline"><u>U</u></button>
                  <span class="toolbar-divider" aria-hidden="true"></span>
                  <button type="button" aria-label="Bullet list">
                    &#8226;
                  </button>
                  <button type="button" aria-label="Numbered list">1.</button>
                  <button type="button" aria-label="Add link">&#128279;</button>
                </div>
                <textarea
                  id="articleContent"
                  name="articleContent"
                  class="content-editor"
                  placeholder="Start writing the article content here..."
                ></textarea>
              </div>
            </section>
          </form>
        </div>
      </section>
    </main>

    <script src="../../js/admin/sidebar.js" defer></script>
    <script src="../../js/admin/admin-add-article.js" defer></script>
    <script
      src="https://kit.fontawesome.com/de3cc7cb54.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
