<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luminary Article</title>
    <link rel="stylesheet" href="../../styles/main/article-page.css" />
    <link rel="stylesheet" href="../../styles/main/nav.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=news"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=lightbulb_2"
    />
    <link rel="icon" type="image/x-icon" href="../../assets/images/new.ico" />
  </head>
  <body>
    <header class="header-container flex flex-col items-center">
      <nav
        aria-label="primary navigation"
        class="header-section__nav flex flex-row justify-between items-center px-4 py-4"
      >
        <a href="../../index.html">
          <picture>
            <source
              media="(min-width: 768px)"
              srcset="../../assets/images/luminary-green-logo.png"
              type="image/png"
            />
            <img
              src="../../assets/images/luminary-green-logo.png"
              alt="Luminary Logo"
              width="120px"
            />
          </picture>
        </a>
        <input type="checkbox" id="nav-toggle" class="nav-toggle" />
        <label
          for="nav-toggle"
          class="hamburger gap-1"
          aria-label="Toggle navigation"
        >
          <span></span><span></span><span></span>
        </label>
        <div class="nav-links">
          <a href="./directory.html">Directory</a>
          <a href="./news.html" class="is-active">News</a>
          <a href="./nomination.html" class="nav-cta__btn rounded-md p-2 px-4"
            >Nominate</a
          >
        </div>
      </nav>
    </header>

    <a href="./news.html" class="back">← Back to News</a>

    <main class="article-container">
      <!-- LEFT: ARTICLE — populated by article-page.js -->
      <section class="article">
        <div id="articleCard" class="article-card">
          <p id="articleLoading">Loading article…</p>
        </div>
      </section>

      <!-- RIGHT: SIDEBAR -->
      <aside class="sidebar">
        <div class="card">
          <section class="news-icon">
            <span class="material-symbols-outlined">news</span>
            <h3>Related Articles</h3>
          </section>
          <!-- populated by article-page.js -->
          <div id="relatedArticles"></div>
        </div>

        <div class="card tip">
          <section class="light-icon">
            <span class="material-symbols-outlined">lightbulb_2</span>
          </section>
          <h3>Have a News Tip?</h3>
          <p>
            Know a story about a woman making an impact that we should cover?
            Submit it for our editors to review.
          </p>
          <a class="tip-card__button" href="../main/submit-story.html"
            >Submit a Story</a
          >
        </div>
      </aside>
    </main>

    <script type="module" src="../../js/main/article-page.js"></script>
  </body>
</html>
