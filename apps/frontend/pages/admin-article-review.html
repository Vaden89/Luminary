<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nomination Review</title>
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/nav.css" />
    <link rel="stylesheet" href="../styles/admin-sidebar.css" />
    <link rel="stylesheet" href="../styles/admin-article-review.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="admin-topbar">
      <a href="../index.html">
        <img
          src="../assets/images/luminary-black-logo.png"
          alt="Luminary Logo"
          width="100px"
        />
      </a>

      <label
        for="nav-toggle"
        class="hamburger gap-1"
        aria-label="Toggle sidebar"
      >
        <span></span>
        <span></span>
        <span></span>
      </label>
    </header>
    <main class="admin-nomination flex flex-row">
      <input type="checkbox" id="nav-toggle" class="nav-toggle" />

      <aside
        id="admin-sidebar"
        class="admin-sidebar admin-sidebar--panel flex flex-col gap-8"
        aria-label="Admin navigation"
      >
        <a
          href="../index.html"
          class="sidebar-brand"
          aria-label="Go to nominations dashboard"
        >
          <picture>
            <source
              media="(min-width: 768px)"
              srcset="../assets/images/luminary-black-logo.png"
              type="image/png"
            />
            <img
              src="../assets/images/luminary-black-logo.png"
              alt="Luminary Logo"
              width="168"
            />
          </picture>
        </a>

        <nav class="sidebar-nav flex flex-col gap-3" aria-label="Admin pages">
          <a
            href="admin-nomination.html"
            class="sidebar-btn sidebar-btn--icon"
          >
            <span class="sidebar-btn__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="presentation">
                <path
                  d="M7 7.75h10a3.25 3.25 0 0 1 3.25 3.25v5A3.25 3.25 0 0 1 17 19.25H7A3.25 3.25 0 0 1 3.75 16v-5A3.25 3.25 0 0 1 7 7.75Zm0 1.5A1.75 1.75 0 0 0 5.25 11v5c0 .967.784 1.75 1.75 1.75h10c.967 0 1.75-.783 1.75-1.75v-5A1.75 1.75 0 0 0 17 9.25H7Zm2.03-3.53A3.25 3.25 0 0 1 14.97 5.7l2.03 2.03-1.06 1.06-2.03-2.03a1.75 1.75 0 0 0-2.47 0L9.41 8.79 8.35 7.73l.68-.68Z"
                />
              </svg>
            </span>
            <span>Nominations</span>
          </a>

          <a href="admin-news.html" class="sidebar-btn sidebar-btn--icon">
            <span class="sidebar-btn__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="presentation">
                <path
                  d="M6.75 4.75h8.5A2.75 2.75 0 0 1 18 7.5v8.75A2.75 2.75 0 0 1 15.25 19H8.5a3.75 3.75 0 0 1-3.75-3.75V7.5a2.75 2.75 0 0 1 2-2.64Zm0 1.5c-.69 0-1.25.56-1.25 1.25v7.75c0 1.243 1.007 2.25 2.25 2.25h7.5c.69 0 1.25-.56 1.25-1.25V7.5c0-.69-.56-1.25-1.25-1.25h-8.5Zm1.5 2.5h5.5v1.5h-5.5v-1.5Zm0 3h7.5v1.5h-7.5v-1.5Zm0 3h7.5v1.5h-7.5v-1.5Z"
                />
              </svg>
            </span>
            <span>News Articles</span>
          </a>
        </nav>

        <label
          for="nav-toggle"
          class="sidebar-close-btn"
          aria-label="Close sidebar"
        >
          &#x2715; Close
        </label>
      </aside>

      <!-- page content -->
      <section class="page-content flex flex-col">
        <!-- article summary -->
        <section class="flex flex-col gap-3">
          <a href="./admin-news.html">&larr; Back to News Management</a>

          <article id="article-summary" class="flex gap-3 justify-between article-summary">
            <div class="flex flex-col gap-3">
              <h1 id="article-heading"></h1>

              <p id="article-description" class="article-description"></p>
            </div>
            <span class="flex items-start gap-3 btn-wrapper">
              <button class="article-btn approve">Approve</button>
              <button class="article-btn reject">Reject</button>
            </span>
          </article>
        </section>

        <!-- article details section -->
        <section
          class="article-details-section flex gap-8 justify-between items-start"
        >
          <section id="article-details" class="article-details p-8 flex flex-col">
            <picture id="article-header-image">
            </picture>

            <article id="article-content" class="flex flex-col gap-3"></article>
          </section>

          <!-- article sidebar -->
          <aside id="article-sidebar" class="article-sidebar p-4 flex flex-col gap-5">
            <div class="article-sidebar-details flex flex-col gap-3">
              <h2 class="article-sidebar-heading">Status</h2>
              <p><span id="article-status" class="article-status pending"></span></p>
            </div>

            <div class="article-sidebar-details flex flex-col gap-1">
              <h2 class="article-sidebar-heading">Source/Type</h2>
              <p id="article-source-type" class="article-sidebar-description"></p>
            </div>

            <div class="article-sidebar-details flex flex-col gap-1">
              <h2 class="article-sidebar-heading">Submitted By</h2>
              <p id="article-submitter" class="article-sidebar-description"></p>
            </div>

            <div class="article-sidebar-details flex flex-col gap-1">
              <h2 class="article-sidebar-heading">Category</h2>
              <p id="article-category" class="article-sidebar-description"></p>
            </div>

            <div class="article-sidebar-details flex flex-col gap-1">
              <h2 class="article-sidebar-heading">Date Submitted</h2>
              <p id="article-submission-date" class="article-sidebar-description"></p>
            </div>

            <a href="">View Original Source</a>
          </aside>
        </section>
      </section>
    </main>
    <script src="../js/sidebar.js"></script>
    <script src="../js/admin-article-review.js"></script>
  </body>
</html>
