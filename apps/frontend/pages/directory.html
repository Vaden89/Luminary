<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luminary - Women's Directory</title>
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/nav.css" />
    <link rel="stylesheet" href="../styles/directory.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="../assets/images/new.ico"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body>
    <header class="header-container flex flex-col items-center">
      <nav
        aria-label="primary navigation"
        class="header-section__nav flex flex-row justify-between items-center px-4 py-4"
      >
        <a href="./index.html">
          <picture>
            <source
              media="(min-width: 768px)"
              srcset="../assets/images/luminary-green-logo.png"
              type="image/png"
            />
            <img
              src="../assets/images/luminary-green-logo.png"
              alt="Luminary Logo"
              width="120px"
            />
          </picture>
        </a>

        <input type="checkbox" id="nav-toggle" class="nav-toggle" />
        <label
          for="nav-toggle"
          class="hamburger gap-1"
          aria-label="Toggle navigation"
        >
          <span></span>
          <span></span>
          <span></span>
        </label>

        <div class="nav-links">
          <a href="#">Directory</a>
          <a href="./news.html">News</a>
          <a href="./index.html" class="nav-cta__btn rounded-md p-2 px-4"
            >Nominate</a
          >
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>Women's Directory</h1>
        <p>
          A searchable, filterable directory of women making an impact across
          all fields. Every profile is verified to highlight real achievements
          and contributions.
        </p>
      </section>
      <section class="filters">
        <input
          id="searchInput"
          input
          type="text"
          placeholder="Search by name, field, organisation, country..."
        />
        <div class="filter-buttons">
          <button>
            Field <i data-lucide="chevron-down" class="filter-icons"></i>
          </button>
          <button>
            Country / Region
            <i data-lucide="chevron-down" class="filter-icons"></i>
          </button>
          <button>
            Year <i data-lucide="chevron-down" class="filter-icons"></i>
          </button>
          <button class="sort">
            Sort: Recent
            <i data-lucide="arrow-up-down" class="filter-icons"></i>
          </button>
        </div>
      </section>
      <section class="directory" id="directory"></section>
    </main>
    <script src="../js/directory.js"></script>
  </body>
</html>
