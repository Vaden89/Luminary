<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luminary | Admin Signup</title>
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/auth.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      href="../assets/images/luminary-black-favicon.png"
    />
  </head>
  <body>
    <main class="auth-page" aria-label="Signup page">
      <article class="auth-card">
        <img
          src="../assets/images/luminary-black-logo.png"
          alt="Luminary Logo"
          width="108"
        />

        <header class="auth-card-header">
          <h1>Create an account</h1>
          <p>Join Luminary to start making an impact.</p>
        </header>

        <form class="auth-form" id="signup-form">
          <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input
              type="text"
              id="signup-name"
              name="fullName"
              placeholder="Ada Lovelace"
              autocomplete="name"
              required
            />
          </div>

          <div class="form-group">
            <label for="signup-email">Email address</label>
            <input
              type="email"
              id="signup-email"
              name="email"
              placeholder="ada.lovelace@example.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label for="signup-password">Password</label>
            <input
              type="password"
              id="auth-password"
              name="password"
              placeholder="Create a password"
              autocomplete="new-password"
              required
            />
            <span class="password-toggle-label flex gap-3">
              <input
                class="password-toggle"
                type="checkbox"
                onclick="displayPassword()"
              />Show Password</span
            >
          </div>

          <button type="submit" class="auth-submit-btn">Sign Up</button>
        </form>

        <footer class="auth-card-footer">
          <p>Already have an account? <a href="admin-login.html">Sign in</a></p>
        </footer>
      </article>
    </main>
    <script src="../js/admin-auth.js" defer></script>
  </body>
</html>
